{% extends "base.html" %}

{% block title %}
Novo Cliente
{% endblock %}

{% block content %}

<h1 class="mb-4">Novo Cliente</h1>

<form method="POST">

    <div class="mb-3">
        <label class="form-label">
            Nome
        </label>

        <input
            type="text"
            name="name"
            class="form-control"
            required
        >
    </div>

    <div class="mb-3">
        <label class="form-label">
            Telefone
        </label>

        <input
            type="text"
            name="phone"
            class="form-control"
        >
    </div>

    <div class="mb-3">
        <label class="form-label">
            E-mail
        </label>

        <input
            type="email"
            name="email"
            class="form-control"
        >
    </div>

    <button type="submit" class="btn btn-success">
        Salvar Cliente
    </button>

</form>

{% endblock %}
