{% extends "base.html" %}

{% block title %}
Novo Cliente
{% endblock %}

{% block content %}

<h1 class="page-title">
            <img
                src="/static/images/clients2.png"
                alt="Ícone de clientes"
                class="me-2"
                style="width: 90px; height: 70px;"
            >
            Novo Cliente
        </h1>

<p class="text-muted mb-4">
    <i class="bi bi-person-plus"></i> Preencha os dados do novo cliente.
</p>

<div class="card card-custom shadow-sm">

    <div class="card-body p-4">

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">
                    <i class="bi bi-person"></i> Nome
                </label>

                <input
                    type="text"
                    name="name"
                    class="form-control"
                    placeholder="Digite o nome do cliente"
                    required
                >
            </div>

            <div class="mb-3">
                <label class="form-label">
                    <i class="bi bi-telephone"></i> Telefone
                </label>

                <input
                    type="text"
                    name="phone"
                    class="form-control phone-mask"
                    placeholder="(00) 00000-0000"
                >
            </div>

            <div class="mb-3">
                <label class="form-label">
                    <i class="bi bi-envelope"></i> E-mail
                </label>

                <input
                    type="email"
                    name="email"
                    class="form-control"
                    placeholder="cliente@email.com"
                >
            </div>

            <button type="submit" class="btn btn-success btn-lg">
                <i class="bi bi-save"></i> Cadastrar Cliente
            </button>

        </form>

    </div>

</div>

{% endblock %}
