{% extends "base.html" %}

{% block title %}
Editar Cliente
{% endblock %}

{% block content %}

<h1 class="mb-4">Editar Cliente</h1>

<div class="card card-custom shadow-sm">

    <div class="card-body p-4">

        <form method="POST">

            <div class="mb-3">

                <label class="form-label">
                    Nome
                </label>

                <input
                    type="text"
                    name="name"
                    class="form-control"
                    value="{{ client.name }}"
                    required
                >

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Telefone
                </label>

                <input
                    type="text"
                    name="phone"
                    class="form-control"
                    value="{{ client.phone }}"
                >

            </div>

            <div class="mb-3">

                <label class="form-label">
                    E-mail
                </label>

                <input
                    type="email"
                    name="email"
                    class="form-control"
                    value="{{ client.email }}"
                >

            </div>

            <button type="submit" class="btn btn-warning">
                Atualizar Cliente
            </button>

        </form>

    </div>

</div>

{% endblock %}
