{% extends "base.html" %}

{% block title %}
Nova Ordem
{% endblock %}

{% block content %}

<div class="mb-4">

    <h1 class="page-title">
        Nova Ordem de Serviço
    </h1>

    <p class="text-muted">
        Preencha os dados da ordem.
    </p>

</div>


<div class="card card-custom shadow-sm">

    <div class="card-body p-4">

        <form method="POST">

            <div class="mb-3">

                <label class="form-label">
                    Título
                </label>

                <input
                    type="text"
                    name="title"
                    class="form-control"
                    placeholder="Ex: Notebook não liga"
                    required
                >

            </div>


            <div class="mb-3">

                <label class="form-label">
                    Equipamento
                </label>

                <input
                    type="text"
                    name="equipment"
                    class="form-control"
                    placeholder="Ex: Dell Inspiron 15"
                    required
                >

            </div>


            <div class="mb-3">

                <label class="form-label">
                    Cliente
                </label>

                <select
                    name="client_id"
                    class="form-select"
                    required
                >

                    <option value="">
                        Selecione um cliente
                    </option>

                    {% for client in clients %}

                    <option value="{{ client.id }}">
                        {{ client.name }}
                    </option>

                    {% endfor %}

                </select>

            </div>


            <div class="mb-3">

                <label class="form-label">
                    Status
                </label>

                <select
                    name="status"
                    class="form-select"
                >

                    <option value="Aberto">
                        Aberto
                    </option>

                    <option value="Em andamento">
                        Em andamento
                    </option>

                    <option value="Finalizado">
                        Finalizado
                    </option>

                </select>

            </div>


            <div class="mb-3">

                <label class="form-label">
                    Descrição
                </label>

                <textarea
                    name="description"
                    class="form-control"
                    rows="4"
                    placeholder="Descreva o problema..."
                    required
                ></textarea>

            </div>


            <div class="mb-4">

                <label class="form-label">
                    Observações Técnicas
                </label>

                <textarea
                    name="technical_notes"
                    class="form-control"
                    rows="4"
                    placeholder="Observações internas..."
                ></textarea>

            </div>


            <button
                type="submit"
                class="btn btn-success btn-lg"
            >
                Criar Ordem
            </button>

        </form>

    </div>

</div>

{% endblock %}
