{% extends "base.html" %}

{% block title %}
Editar Ordem
{% endblock %}

{% block content %}

<div class="mb-4">

    <h1 class="page-title">
            <img
                src="/static/images/orders2.png"
                alt="Ícone de ordens de serviço"
                class="me-2"
                style="width: 90px; height: 70px;"
            >
        Editar Ordem de Serviço
        </h1>

    <p class="text-muted">
        <i class="bi bi-pencil"></i> Atualize os dados da ordem.
    </p>

</div>


<div class="card card-custom shadow-sm">

    <div class="card-body p-4">

        <form method="POST">

            <div class="mb-3">

                <label class="form-label">
                    Título
                </label>

                <input
                    type="text"
                    name="title"
                    class="form-control"
                    value="{{ order.title }}"
                    required
                >

            </div>


            <div class="mb-3">

                <label class="form-label">
                    <i class="bi bi-gear"></i> Equipamento
                </label>

                <input
                    type="text"
                    name="equipment"
                    class="form-control"
                    value="{{ order.equipment }}"
                    required
                >

            </div>


            <div class="mb-3">

                <label class="form-label">
                    <i class="bi bi-person"></i> Cliente
                </label>

                <select
                    name="client_id"
                    class="form-select"
                    required
                >

                    {% for client in clients %}

                    <option
                        value="{{ client.id }}"
                        {% if client.id == order.client_id %}
                        selected
                        {% endif %}
                    >
                        {{ client.name }}
                    </option>

                    {% endfor %}

                </select>

            </div>


            <div class="mb-3">

                <label class="form-label">
                    <i class="bi bi-flag"></i> Status
                </label>

                <select
                    name="status"
                    class="form-select"
                >

                    <option
                        value="Aberto"
                        {% if order.status == "Aberto" %}
                        selected
                        {% endif %}
                    >
                        Aberto
                    </option>

                    <option
                        value="Em andamento"
                        {% if order.status == "Em andamento" %}
                        selected
                        {% endif %}
                    >
                        Em andamento
                    </option>

                    <option
                        value="Finalizado"
                        {% if order.status == "Finalizado" %}
                        selected
                        {% endif %}
                    >
                        Finalizado
                    </option>

                </select>

            </div>


            <div class="mb-3">

                <label class="form-label">
                    <i class="bi bi-card-text"></i> Descrição
                </label>

                <textarea
                    name="description"
                    class="form-control"
                    rows="4"
                    required
                >{{ order.description }}</textarea>

            </div>


            <div class="mb-4">

                <label class="form-label">
                    <i class="bi bi-info-circle"></i> Observações Técnicas
                </label>

                <textarea
                    name="technical_notes"
                    class="form-control"
                    rows="4"
                >{{ order.technical_notes }}</textarea>

            </div>


            <button
                type="submit"
                class="btn btn-primary btn-lg"
            >
                Salvar Alterações
            </button>

        </form>

    </div>

</div>

{% endblock %}
